name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APPLE_API_KEY_PATH: /tmp/AuthKey.p8
      APPLE_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        env:
          BUILD_CERT_P12: ${{ secrets.BUILD_CERT_P12 }}
          BUILD_CERT_PASSWORD: ${{ secrets.BUILD_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$BUILD_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$BUILD_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Import App Store Connect API key
        env:
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        run: |
          echo "$AC_API_KEY_P8" | base64 --decode > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.7.4"
          mkdir -p bin
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar xJ --include="*/sign_update" --strip-components=1 -C bin 2>/dev/null || \
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar xJ -C /tmp && \
            find /tmp -name sign_update -exec cp {} bin/sign_update \; 2>/dev/null || true
          if [ -f bin/sign_update ]; then
            chmod +x bin/sign_update
            echo "sign_update ready"
          fi

      - name: Build, notarize, staple
        run: ./scripts/build-and-notarize.sh

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        run: |
          if [ ! -f build/sparkle.env ]; then
            echo "⚠  No Sparkle signature — skipping appcast update"
            exit 0
          fi
          source build/sparkle.env
          VERSION="${{ steps.version.outputs.version }}"
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          python3 scripts/update-appcast.py \
            --version "$VERSION" \
            --url "$DMG_URL" \
            --size "$DMG_SIZE" \
            --signature "$SPARKLE_SIG" \
            --pubdate "$PUB_DATE" \
            appcast.xml

      - name: Commit appcast.xml
        run: |
          if ! git diff --quiet appcast.xml 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add appcast.xml
            git commit -m "chore: update appcast for ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
          fi

      - name: Read release notes
        id: notes
        run: |
          python3 - <<'EOF'
          import re, sys
          with open("CHANGELOG.md") as f:
              text = f.read()
          version = "${{ steps.version.outputs.version }}"
          pattern = rf'## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          notes = m.group(1).strip() if m else ""
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DNSFlip ${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: |
            build/DNSFlip-${{ steps.version.outputs.version }}.dmg
            build/DNSFlip-${{ steps.version.outputs.version }}.dmg.sha256

      - name: Bump Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew bump"
            exit 0
          fi
          source build/sparkle.env 2>/dev/null || true
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(cut -d' ' -f1 "build/DNSFlip-${VERSION}.dmg.sha256")
          gh api repos/cicoub13/homebrew-tap/contents/Casks/dnsflip.rb \
            --jq '.sha' > /tmp/cask_sha.txt || true
          CASK_SHA=$(cat /tmp/cask_sha.txt 2>/dev/null || echo "")
          NEW_CONTENT=$(cat <<RUBY
          cask "dnsflip" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/cicoub13/DNSFlip/releases/download/v#{version}/DNSFlip-#{version}.dmg"
            name "DNSFlip"
            desc "Menu bar app to switch DNS servers"
            homepage "https://github.com/cicoub13/DNSFlip"

            app "DNSFlip.app"

            zap trash: [
              "~/Library/Preferences/com.bootstrap.DNSFlip.plist",
              "~/Library/Caches/com.bootstrap.DNSFlip",
            ]
          end
          RUBY
          )
          ENCODED=$(echo "$NEW_CONTENT" | base64)
          PAYLOAD="{\"message\":\"chore: bump dnsflip to ${VERSION}\",\"content\":\"${ENCODED}\""
          if [ -n "$CASK_SHA" ]; then
            PAYLOAD="${PAYLOAD},\"sha\":\"${CASK_SHA}\""
          fi
          PAYLOAD="${PAYLOAD}}"
          gh api -X PUT repos/cicoub13/homebrew-tap/contents/Casks/dnsflip.rb \
            --input - <<< "$PAYLOAD"
